---
# Local test to verify collection is working
- name: Verify infra.dns collection
  hosts: localhost
  connection: local
  gather_facts: yes
  tasks:
    - name: Check if collection is installed
      ansible.builtin.command: ansible-galaxy collection list infra.dns
      register: collection_check
      changed_when: false

    - name: Display collection info
      ansible.builtin.debug:
        var: collection_check.stdout_lines

    - name: Verify role files exist
      ansible.builtin.stat:
        path: "/usr/share/ansible/collections/ansible_collections/infra/dns/{{ item }}"
      loop:
        - roles/bind9/tasks/main.yml
        - roles/dnscrypt_proxy/tasks/main.yml
        - playbooks/deploy_bind9.yml
        - playbooks/deploy_dnscrypt_proxy.yml
      register: role_files

    - name: Check all role files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Role file {{ item.item }} not found"
      loop: "{{ role_files.results }}"

    - name: Success message
      ansible.builtin.debug:
        msg: "✓ infra.dns collection is properly installed and accessible"
